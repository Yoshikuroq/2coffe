<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strawwberry Cafe</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="game_container">
      <!-- игровой фон -->
      <div
        id="coffeeCanvas"
        style="width: 900px; height: 550px"
        class="game_screen"
      >
        <!-- передняя доска -->
        <div id="front_desk" class="front_desk">
          <div id="serving_zone">
            <img src="./img/clients/azula.png" class="client_img" />
          </div>
          <button id="toBackBtn"></button>
          <div id="table_frontDesk"></div>
          <div id="transfer_toBack"></div>
        </div>

        <!-- задняя доска -->
        <div id="back_desk" class="back_desk">
          <!-- кофеварка -->
          <div id="coffee_maker">
            <button class="maker_btn btn"></button>
          </div>
          <!-- кофемолка -->
          <div id="coffee_grinder">
            <button class="grinder_btn btn"></button>
          </div>
          <div id="tamper_zone" class="tamper_zone">
            <!-- холдер -->
            <img
              id="holder"
              class="holder"
              src="./img/main_assets/holder/holder_empty.png"
              draggable="true"
            />
            <!-- темпер -->
            <img
              id="tamper"
              class="tamper"
              src="./img/main_assets/tamper.png"
              draggable="true"
            />
          </div>

          <!-- зона стаканов -->
          <div id="cups_container">
            <!-- стакан -->
            <img
              id="cup"
              class="cup"
              src="./img/main_assets/cup/cup.png"
              draggable="true"
            />
            <!-- коробка с молоком -->
            <img
              class="milk_box"
              src="./img/main_assets/milk.png"
              draggable="true"
            />
          </div>
          <!-- стол на стойке сзади -->
          <div id="table_backDesk"></div>
          <!-- зона перетаскивания -->
          <div id="transfer_toFront"></div>
          <button id="toFrontBtn"></button>
          <!-- раковина -->
          <div id="sink"></div>

          <!-- книжная полка и заметка на стене -->
          <div id="book"></div>
          <div id="note"><p id="note_text"></p></div>
        </div>
      </div>
      <footer>Strawwbery Cafe | cozy & chill</footer>
    </div>
    <script src="main.js"></script>
  </body>
</html>
